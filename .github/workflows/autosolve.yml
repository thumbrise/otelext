name: Autosolve

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  ask-goose:
    if: |
      contains(github.event.label.name, 'autosolve') || 
      contains(github.event.comment.body, '@goose')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install goose
        run: |
          pip install --upgrade pip
          pip install goose-ai

      - name: Run goose on issue
        run: |
          goose run \
            --issue ${{ github.event.issue.number }} \
            --model openrouter/deepseek-coder \
            --validation "New tests satisfy requirements and all tests pass. Commit with conventional commit message." \
            --yes
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_TOKEN }}
          GH_TOKEN: ${{ github.token }}