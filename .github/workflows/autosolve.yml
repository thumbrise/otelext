name: Autosolve

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  resolve:

    if: |
      github.event.label.name == 'autosolve' ||
      (github.event.comment && contains(github.event.comment.body, '@autosolve'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OpenHands Resolver in Docker
        run: |
          docker run --rm \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e PAT_TOKEN=${{ secrets.PAT_TOKEN }} \
            -e LLM_MODEL=${{ secrets.LLM_MODEL }} \
            -e LLM_API_KEY=${{ secrets.LLM_API_KEY }} \
            -e LLM_BASE_URL=${{ secrets.LLM_BASE_URL }} \
            -v ${{ github.workspace }}:/workspace \
            ghcr.io/openhands/openhands-resolver:latest \
            python -m openhands_resolver.resolve_issues \
              --repo ${{ github.repository }} \
              --issue-numbers ${{ github.event.issue.number || github.event.pull_request.number }}