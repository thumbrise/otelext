name: test

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x, 1.26.x]

    steps:
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Setup go-task
        uses: rnorton5432/setup-task@v1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Test
        run: task test